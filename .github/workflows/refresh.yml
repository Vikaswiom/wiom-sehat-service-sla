name: refresh-data
# Hourly refresh of data.json (grade %, weak-connection list, open tickets) from Metabase.
# The Service-SLA site reads this same file, so one run keeps both links current.
on:
  schedule:
    - cron: '0 * * * *'        # every hour, on the hour (UTC)
  workflow_dispatch:            # allow manual "Run workflow"

permissions:
  contents: write               # commit data.json back

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Refresh data.json from Metabase
        env:
          METABASE_API_KEY: ${{ secrets.METABASE_API_KEY }}
        run: python refresh.py
      - name: Commit if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- data.json; then
            echo "No change in data.json — nothing to commit."
          else
            git add data.json
            git commit -m "auto: hourly data refresh [skip ci]"
            git push
          fi
