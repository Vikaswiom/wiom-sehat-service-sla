<!doctype html>
<html lang="hi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>सेहत गारंटी</title>
<style>
body{background:#F7F5FA;color:#a8a2b4;margin:0;display:flex;min-height:100vh;align-items:center;justify-content:center;
     font-family:"Noto Sans Devanagari","Nirmala UI","Segoe UI",system-ui,sans-serif;font-size:12.5px;font-weight:600;text-align:center;padding:20px;line-height:1.7;}
</style>
</head>
<body>
<div id="m">खोला जा रहा है…</div>
<script>
/* Path-style entry: /wiom-sehat-mg/a0b6t9  →  /wiom-sehat-mg/?cspId=a0b6t9
   GitHub Pages serves this file for any unknown path, so we only redirect when
   the last segment actually looks like a CSP id — otherwise it's a real 404.   */
(function(){
  var ID_RE = /^[a-z][a-z0-9]{4,9}$/;
  var parts = location.pathname.split('/').filter(Boolean);
  var last  = (parts.pop() || '').toLowerCase();
  var base  = '/' + parts.join('/') + (parts.length ? '/' : '');

  if (ID_RE.test(last) && last.indexOf('.') === -1){
    location.replace(base + '?cspId=' + encodeURIComponent(last));
    return;
  }
  document.getElementById('m').innerHTML =
    'ये पेज आपकी CSP ID के साथ खुलता है.<br>App में “सेहत गारंटी” पर tap कीजिए.';
})();
</script>
</body>
</html>
